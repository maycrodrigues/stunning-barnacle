name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          TAG="release-${GITHUB_RUN_NUMBER}"
          NAME="Release ${GITHUB_RUN_NUMBER}"

          PREV_TAG="$(git tag --list 'release-*' --sort=-creatordate | head -n 1 || true)"

          if [[ -n "${PREV_TAG}" ]]; then
            RAW="$(git log --no-merges --pretty=format:'%s' "${PREV_TAG}..${GITHUB_SHA}" || true)"
          else
            RAW="$(git log --no-merges -n 20 --pretty=format:'%s' "${GITHUB_SHA}" || true)"
          fi

          RELEVANT="$(printf '%s\n' "${RAW}" | grep -E '^(feat|fix|perf|refactor)(\(.+\))?: ' || true)"

          if [[ -z "${RELEVANT}" ]]; then
            BODY=$'## O que foi feito\n- Ajustes internos e manutenção.\n\nCommit: '"${GITHUB_SHA}"
          else
            BODY="## O que foi feito"$'\n'
            while IFS= read -r line; do
              [[ -n "${line}" ]] && BODY+="- ${line}"$'\n'
            done <<< "${RELEVANT}"
            BODY+=$'\nCommit: '"${GITHUB_SHA}"
          fi

          {
            echo "tag_name=${TAG}"
            echo "name=${NAME}"
            echo "body<<EOF"
            printf "%b\n" "${BODY}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag_name }}
          name: ${{ steps.notes.outputs.name }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
